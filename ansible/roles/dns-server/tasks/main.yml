---
- name: Ensure BIND packages are installed
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop:
    - bind
    - bind-utils

- name: Deploy main BIND config
  ansible.builtin.template:
    src: named.conf.j2
    dest: /etc/named.conf
    owner: root
    group: named
    mode: '0640'
  notify: Restart named

- name: Deploy zone declarations
  ansible.builtin.template:
    src: lab.local.zones.j2
    dest: /etc/named/lab.local.zones
    owner: root
    group: named
    mode: '0640'
  notify: Restart named

- name: Deploy zone file
  ansible.builtin.template:
    src: lab.local.zone.j2
    dest: /var/named/lab.local.zone
    owner: root
    group: named
    mode: '0640'
  notify: Restart named

- name: Ensure named is enabled and started
  ansible.builtin.service:
    name: named
    state: started
    enabled: yes
