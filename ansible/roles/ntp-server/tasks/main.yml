---
- name: Ensure chrony is installed
  ansible.builtin.dnf:
    name: chrony
    state: present

- name: Deploy chrony config (server mode — serves NTP to lab clients)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart chronyd

- name: Ensure chronyd is enabled and started
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: yes
