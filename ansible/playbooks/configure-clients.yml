---
- name: Configure lab DNS and NTP clients
  hosts: clients
  become: yes

  tasks:
    - name: Ensure bind-utils is installed (for dig/host)
      ansible.builtin.dnf:
        name: bind-utils
        state: present

    - name: Configure /etc/resolv.conf to use lab DNS
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          search lab.local
          nameserver 192.168.56.10
        owner: root
        group: root
        mode: '0644'

    - name: Configure /etc/chrony.conf to use lab NTP server
      ansible.builtin.copy:
        dest: /etc/chrony.conf
        content: |
          server 192.168.56.10 iburst
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
          keyfile /etc/chrony.keys
          ntsdumpdir /var/lib/chrony
          leapsectz right/UTC
          logdir /var/log/chrony
        owner: root
        group: root
        mode: '0644'
      notify: Restart chronyd

  handlers:
    - name: Restart chronyd
      ansible.builtin.service:
        name: chronyd
        state: restarted
